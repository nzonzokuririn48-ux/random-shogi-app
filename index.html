<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>オンライン将棋テスト</title>
  <style>
    body {
      font-family: sans-serif;
      text-align: center;
      margin: 20px;
    }

    #top {
      margin-bottom: 20px;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(9, 50px);
      grid-template-rows: repeat(9, 50px);
      width: 450px;
      margin: 20px auto;
      border: 2px solid black;
    }

    .cell {
      width: 50px;
      height: 50px;
      border: 1px solid black;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 18px;
      box-sizing: border-box;
      user-select: none;
      background: #f5d58b;
    }

    .selected {
      background: #facc15;
    }

    #status {
      margin-top: 10px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div id="top">
    <input id="name" placeholder="名前" />
    <button onclick="connect()">接続</button>
  </div>

  <div id="status">未接続</div>
  <div id="board"></div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    let socket = null;
    let selected = null;
    let board = [];
    let mySide = null;

    function initBoard() {
      board = [];

      for (let r = 0; r < 9; r++) {
        const row = [];
        for (let c = 0; c < 9; c++) {
          row.push("");
        }
        board.push(row);
      }

      for (let i = 0; i < 9; i++) {
        board[2][i] = "歩";
        board[6][i] = "歩";
      }
    }

    function render() {
      const el = document.getElementById("board");
      el.innerHTML = "";

      for (let r = 0; r < 9; r++) {
        for (let c = 0; c < 9; c++) {
          const div = document.createElement("div");
          div.className = "cell";

          if (selected && selected.r === r && selected.c === c) {
            div.classList.add("selected");
          }

          div.textContent = board[r][c];

          div.onclick = () => {
            handleCellClick(r, c);
          };

          el.appendChild(div);
        }
      }
    }

    function handleCellClick(r, c) {
      if (!socket) return;
      if (!mySide) return;

      if (selected) {
        const piece = selected.piece;

        board[r][c] = piece;
        board[selected.r][selected.c] = "";

        socket.emit("move", {
          from: { r: selected.r, c: selected.c },
          to: { r, c },
          piece: piece
        });

        selected = null;
        render();
        return;
      }

      if (board[r][c]) {
        selected = {
          r: r,
          c: c,
          piece: board[r][c]
        };
        render();
      }
    }

    function connect() {
      const name = document.getElementById("name").value.trim();

      if (!name) {
        alert("名前を入れてください");
        return;
      }

      if (socket) {
        socket.disconnect();
      }

      socket = io();

      socket.on("connect", () => {
        document.getElementById("status").textContent = "接続完了。対戦相手を待っています...";
        socket.emit("join", name);
      });

      socket.on("waiting", () => {
        document.getElementById("status").textContent = "マッチング待機中...";
      });

      socket.on("start", (data) => {
        mySide = data.side;
        selected = null;
        initBoard();
        render();

        document.getElementById("status").textContent =
          `対戦開始！ 相手: ${data.opponent} / あなた: ${mySide}`;
      });

      socket.on("move", (data) => {
        board[data.to.r][data.to.c] = data.piece;
        board[data.from.r][data.from.c] = "";
        selected = null;
        render();
      });

      socket.on("opponentLeft", () => {
        document.getElementById("status").textContent = "相手が切断しました";
      });
    }
  </script>
</body>
</html>
